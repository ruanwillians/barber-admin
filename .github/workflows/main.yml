name: Deploy to OKE OCI

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ruanwill/barber-admin:${{ github.sha }}
  DEPLOYMENT_NAME: barber-admin-deployment
  CONTAINER_NAME: barber-admin-container
  NAMESPACE: production

jobs:
  ci_cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build the project using Maven
        run: mvn -f ./admin/pom.xml clean install -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use
          docker buildx inspect --bootstrap

      - name: Build Docker image for multiple architectures
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          file: ./admin/Dockerfile
          tags: ${{ env.IMAGE_NAME }}
          platforms: linux/amd64,linux/arm64

      - name: "Write Config & Key Files"
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" >> ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config

          # Decode and decrypt the private key
          echo "${{ secrets.OCI_PRIVATE_KEY_FILE }}" | base64 --decode > ~/.oci/key.enc
          openssl rsa -in ~/.oci/key.enc -out ~/.oci/key.pem -passin pass:${{ secrets.OCI_PASSPHRASE }}
          chmod 600 ~/.oci/key.pem

          echo "key_file=~/.oci/key.pem" >> ~/.oci/config

      - name: "Install OCI CLI"
        run: |
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "::add-path::/home/runner/bin"
          exec -l $SHELL

      - name: "Fix Config File Permissions"
        run: |
          oci setup repair-file-permissions --file ~/.oci/key.pem
          oci setup repair-file-permissions --file ~/.oci/config

      - name: "Download the KUBECONFIG"
        run: |
          mkdir -p ~/.kube
          oci ce cluster create-kubeconfig --cluster-id ${{ secrets.OKE_OCID }} --file ~/.kube/config --region ${{ secrets.OCI_REGION }} --token-version 2.0.0
          export KUBECONFIG=~/.kube/config

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 --decode > ~/.kube/config
          export KUBECONFIG=~/.kube/config

      - name: Update Deployment with new image
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ env.IMAGE_NAME }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}
